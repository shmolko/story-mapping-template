<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Map</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /*
      Color palette taken from the Neznám design system:
      - Red (#e53535) is the single accent color — used for goals, primary buttons, icons
      - Everything else is white, off-white (#f5f5f5), or neutral gray
    */
    :root {
      --red:        #CC0000;
      --red-dark:   #a80000;
      --red-light:  #fff0f0;
      --bg-page:    #f5f5f5;
      --bg-white:   #ffffff;
      --bg-card:    #f3f4f6;
      --border:     #e5e7eb;
      --border-mid: #d1d5db;
      --text:       #1a1a1a;
      --text-mid:   #4b5563;
      --text-soft:  #9ca3af;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      color: var(--text);
    }

    textarea {
      font-family: inherit;
      resize: none;
      overflow: hidden;
      border: none;
      outline: none;
      background: transparent;
      cursor: text;
      display: block;
      width: 100%;
    }

    /* ── App shell: mimics the white main panel from the screenshot ── */
    .app-shell {
      background: var(--bg-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar: matches the section header style (red icon + title + actions) ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      background: var(--bg-white);
    }

    /* Red clock-like icon — mirrors the red icons in the screenshot */
    .topbar-icon {
      width: 28px;
      height: 28px;
      background: var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #fff;
      font-size: 14px;
    }

    #projectTitle {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      min-width: 160px;
      padding: 3px 6px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    #projectTitle:focus {
      border-color: var(--red);
      background: var(--red-light);
    }

    .btn {
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      border: 1px solid var(--border-mid);
    }
    /* Primary red button — matches "Zobrazit" in the screenshot */
    .btn-save  { background: var(--red); color: #fff; border-color: var(--red); }
    .btn-save:hover  { background: var(--red-dark); border-color: var(--red-dark); }
    /* Secondary outline buttons */
    .btn-load  { background: var(--bg-white); color: var(--text-mid); }
    .btn-load:hover  { background: var(--bg-page); }
    .btn-print { background: var(--bg-white); color: var(--text-mid); }
    .btn-print:hover { background: var(--bg-page); }

    /* ── Board wrapper ── */
    .board-wrap {
      padding: 20px 24px 24px;
      flex: 1;
    }

    /* ── Board ── */
    .board { display: flex; flex-direction: column; gap: 4px; }

    /* ── Column header row ── */
    .board-header {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 4px;
      margin-bottom: 4px;
    }
    .col-label {
      background: var(--text);
      color: #f3f4f6;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 6px;
    }

    /* ── Goal row ── */
    .goal-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 4px;
      align-items: stretch;
    }

    /* Left cell — goal, styled with the primary red like the icon buttons */
    .goal-cell {
      background: var(--red);
      border-radius: 6px;
      padding: 14px 28px 14px 14px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 90px;
    }
    .goal-cell textarea {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
    }
    .goal-cell textarea::placeholder { color: rgba(255,255,255,0.5); }
    .goal-cell textarea:focus {
      background: rgba(255,255,255,0.12);
      border-radius: 3px;
      padding: 3px 5px;
    }
    .goal-num {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .goal-del {
      position: absolute;
      top: 8px; right: 8px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .goal-cell:hover .goal-del { opacity: 1; }
    .goal-del:hover { background: rgba(255,255,255,0.38); }

    /* Right cell — stories area, plain white with a subtle border */
    .stories-cell {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
    }

    /* ── Story chunk card ── */
    .story-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 10px 8px;
      width: 180px;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .story-card:hover {
      border-color: var(--red);
      box-shadow: 0 1px 6px rgba(229,53,53,0.12);
    }
    .story-card textarea.story-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      padding-right: 18px;
    }
    .story-card textarea.story-title:focus {
      background: var(--red-light);
      border-radius: 4px;
      padding: 2px 4px;
    }
    .story-del {
      position: absolute;
      top: 7px; right: 7px;
      width: 17px; height: 17px;
      border-radius: 50%;
      background: #fee2e2;
      border: none;
      color: var(--red);
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .story-card:hover .story-del { opacity: 1; }
    .story-del:hover { background: #fecaca; }

    /* Thin line separating story title from its tasks */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 7px 0 5px;
    }

    /* ── Tasks ── */
    .task-list { display: flex; flex-direction: column; gap: 2px; }

    .task-row {
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }
    .task-bullet {
      color: var(--red);
      font-size: 7px;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .task-row textarea {
      font-size: 11px;
      color: var(--text-mid);
      line-height: 1.45;
      flex: 1;
    }
    .task-row textarea:focus {
      background: var(--bg-page);
      border-radius: 2px;
      padding: 1px 3px;
    }
    .task-del {
      background: none;
      border: none;
      color: var(--border-mid);
      font-size: 13px;
      cursor: pointer;
      padding: 0 2px;
      opacity: 0;
      flex-shrink: 0;
      margin-top: 1px;
      line-height: 1;
      transition: color 0.1s;
    }
    .task-row:hover .task-del { opacity: 1; }
    .task-del:hover { color: var(--red); }

    /* Small "+ Add task" link below tasks */
    .add-task-btn {
      background: none;
      border: none;
      font-size: 11px;
      color: var(--text-soft);
      cursor: pointer;
      padding: 4px 0 0;
      text-align: left;
      transition: color 0.15s;
    }
    .add-task-btn:hover { color: var(--red); }

    /* Dashed placeholder card for adding a new story chunk */
    .add-story-card {
      width: 180px;
      border: 1px dashed var(--border-mid);
      border-radius: 6px;
      padding: 10px;
      background: transparent;
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      align-self: flex-start;
    }
    .add-story-card:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-light);
    }

    /* Full-width "Add Goal" button at the bottom */
    .add-goal-btn {
      width: 100%;
      padding: 10px;
      background: var(--bg-white);
      border: 1px dashed var(--border-mid);
      border-radius: 6px;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 4px;
    }
    .add-goal-btn:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-light);
    }

    /* ── Print / PDF styles ── */
    @media print {
      body, .app-shell { background: #fff; }
      .topbar { border-bottom: 1px solid #e5e7eb; padding: 12px 16px; }

      /* Hide all interactive controls */
      .topbar .btn,
      .goal-del, .story-del, .task-del,
      .add-story-card, .add-task-btn, .add-goal-btn { display: none !important; }

      /* Prevent page breaks inside rows */
      .goal-row { break-inside: avoid; }

      /* Preserve colors in print */
      .goal-cell   { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .stories-cell { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .story-card  { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- ── Top bar ── -->
  <div class="topbar">
    <!-- Red circle icon mirrors the section icons in the screenshot -->
    <div class="topbar-icon">&#9632;</div>
    <textarea id="projectTitle" rows="1" placeholder="Project name…">Project Story Map</textarea>
    <button class="btn btn-load"  onclick="loadFromFile()">Load JSON</button>
    <button class="btn btn-save"  onclick="saveToFile()">Save JSON</button>
    <button class="btn btn-print" onclick="window.print()">Export PDF</button>
  </div>

  <!-- ── Board wrapper ── -->
  <div class="board-wrap">

    <!-- ── Column labels ── -->
    <div class="board-header">
      <div class="col-label">Goals</div>
      <div class="col-label">Story Chunks &amp; Tasks</div>
    </div>

    <!-- ── Board ── -->
    <div class="board" id="board"></div>

    <!-- Add goal -->
    <button class="add-goal-btn" onclick="addGoal()">+ Add Goal</button>

  </div><!-- /board-wrap -->
</div><!-- /app-shell -->

<!-- Hidden file input for loading JSON -->
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileLoad(event)" />

<script>
  // ── Helpers ──────────────────────────────────────────────────────────────────

  // Generates a short random ID for each item
  function uid() {
    return Math.random().toString(36).slice(2, 9);
  }

  // Makes a textarea grow to fit its content automatically
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  // Call autoResize on all textareas after rendering
  function resizeAll() {
    document.querySelectorAll('textarea').forEach(autoResize);
  }

  // ── Data model ───────────────────────────────────────────────────────────────
  // This is the single source of truth. Everything renders from here.
  // When saved, this exact object is written to a .json file.
  let data = {
    title: "Project Story Map",
    goals: []
  };

  // ── Render ───────────────────────────────────────────────────────────────────

  function render() {
    // Sync title field
    const titleEl = document.getElementById('projectTitle');
    titleEl.value = data.title;
    autoResize(titleEl);

    const board = document.getElementById('board');
    board.innerHTML = '';

    data.goals.forEach((goal, goalIndex) => {
      const row = document.createElement('div');
      row.className = 'goal-row';
      row.dataset.goalId = goal.id;

      // Left side: the goal
      const goalCell = document.createElement('div');
      goalCell.className = 'goal-cell';
      goalCell.innerHTML = `
        <div class="goal-num">Goal ${goalIndex + 1}</div>
        <textarea
          placeholder="Describe this goal…"
          oninput="updateGoalText('${goal.id}', this.value); autoResize(this)"
        >${escHtml(goal.text)}</textarea>
        <button class="goal-del" title="Delete goal" onclick="deleteGoal('${goal.id}')">×</button>
      `;

      // Right side: story cards
      const storiesCell = document.createElement('div');
      storiesCell.className = 'stories-cell';

      goal.stories.forEach(story => {
        storiesCell.appendChild(buildStoryCard(goal.id, story));
      });

      // "Add story" placeholder card
      const addStoryBtn = document.createElement('button');
      addStoryBtn.className = 'add-story-card';
      addStoryBtn.textContent = '+ Add Story Chunk';
      addStoryBtn.onclick = () => addStory(goal.id);
      storiesCell.appendChild(addStoryBtn);

      row.appendChild(goalCell);
      row.appendChild(storiesCell);
      board.appendChild(row);
    });

    // After the DOM is updated, resize all textareas
    resizeAll();
  }

  // Build the DOM element for one story chunk card
  function buildStoryCard(goalId, story) {
    const card = document.createElement('div');
    card.className = 'story-card';
    card.id = 'story-' + story.id;

    // Story title
    const titleArea = document.createElement('textarea');
    titleArea.className = 'story-title';
    titleArea.placeholder = 'Story chunk title…';
    titleArea.value = story.text;
    titleArea.oninput = () => { updateStoryText(goalId, story.id, titleArea.value); autoResize(titleArea); };

    // Delete button for the card
    const delBtn = document.createElement('button');
    delBtn.className = 'story-del';
    delBtn.title = 'Delete story chunk';
    delBtn.textContent = '×';
    delBtn.onclick = () => deleteStory(goalId, story.id);

    // Divider between title and tasks
    const divider = document.createElement('div');
    divider.className = 'divider';

    // Task list
    const taskList = document.createElement('div');
    taskList.className = 'task-list';
    story.tasks.forEach(task => {
      taskList.appendChild(buildTaskRow(goalId, story.id, task));
    });

    // "Add task" button
    const addTaskBtn = document.createElement('button');
    addTaskBtn.className = 'add-task-btn';
    addTaskBtn.textContent = '+ Add task';
    addTaskBtn.onclick = () => addTask(goalId, story.id);

    card.appendChild(delBtn);
    card.appendChild(titleArea);
    card.appendChild(divider);
    card.appendChild(taskList);
    card.appendChild(addTaskBtn);

    return card;
  }

  // Build the DOM element for one task row
  function buildTaskRow(goalId, storyId, task) {
    const row = document.createElement('div');
    row.className = 'task-row';
    row.id = 'task-' + task.id;

    const bullet = document.createElement('span');
    bullet.className = 'task-bullet';
    bullet.textContent = '●';

    const textarea = document.createElement('textarea');
    textarea.value = task.text;
    textarea.placeholder = 'Task description…';
    textarea.oninput = () => { updateTaskText(goalId, storyId, task.id, textarea.value); autoResize(textarea); };

    const delBtn = document.createElement('button');
    delBtn.className = 'task-del';
    delBtn.title = 'Delete task';
    delBtn.textContent = '×';
    delBtn.onclick = () => deleteTask(goalId, storyId, task.id);

    row.appendChild(bullet);
    row.appendChild(textarea);
    row.appendChild(delBtn);

    return row;
  }

  // Escape special HTML characters to prevent broken rendering
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Data mutations ────────────────────────────────────────────────────────────
  // Each of these updates the data model and triggers a re-render

  function updateGoalText(goalId, text) {
    const g = data.goals.find(g => g.id === goalId);
    if (g) g.text = text;
  }

  function updateStoryText(goalId, storyId, text) {
    const g = data.goals.find(g => g.id === goalId);
    const s = g?.stories.find(s => s.id === storyId);
    if (s) s.text = text;
  }

  function updateTaskText(goalId, storyId, taskId, text) {
    const g = data.goals.find(g => g.id === goalId);
    const s = g?.stories.find(s => s.id === storyId);
    const t = s?.tasks.find(t => t.id === taskId);
    if (t) t.text = text;
  }

  function addGoal() {
    const newId = uid();
    data.goals.push({ id: newId, text: '', stories: [] });
    render();
    // Focus the textarea inside the newly created goal cell
    const goalRow = document.querySelector(`[data-goal-id="${newId}"]`);
    if (goalRow) goalRow.querySelector('textarea').focus();
  }

  function deleteGoal(goalId) {
    if (!confirm('Delete this goal and all its story chunks?')) return;
    data.goals = data.goals.filter(g => g.id !== goalId);
    render();
  }

  function addStory(goalId) {
    const g = data.goals.find(g => g.id === goalId);
    if (!g) return;
    const newId = uid();
    g.stories.push({ id: newId, text: '', tasks: [] });
    render();
    // Focus the title textarea of the newly created story card
    const card = document.getElementById('story-' + newId);
    if (card) card.querySelector('textarea').focus();
  }

  function deleteStory(goalId, storyId) {
    const g = data.goals.find(g => g.id === goalId);
    if (g) { g.stories = g.stories.filter(s => s.id !== storyId); render(); }
  }

  function addTask(goalId, storyId) {
    const g = data.goals.find(g => g.id === goalId);
    const s = g?.stories.find(s => s.id === storyId);
    if (!s) return;
    const newId = uid();
    s.tasks.push({ id: newId, text: '' });
    render();
    // Focus the textarea of the newly created task
    const taskRow = document.getElementById('task-' + newId);
    if (taskRow) taskRow.querySelector('textarea').focus();
  }

  function deleteTask(goalId, storyId, taskId) {
    const g = data.goals.find(g => g.id === goalId);
    const s = g?.stories.find(s => s.id === storyId);
    if (s) { s.tasks = s.tasks.filter(t => t.id !== taskId); render(); }
  }

  // ── Save & Load ───────────────────────────────────────────────────────────────

  // Saves the current board as a .json file that downloads to your computer
  function saveToFile() {
    data.title = document.getElementById('projectTitle').value;
    const json = JSON.stringify(data, null, 2); // "null, 2" makes it nicely indented
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = (data.title || 'story-map') + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  // Opens the file picker so you can load a previously saved .json
  function loadFromFile() {
    document.getElementById('fileInput').click();
  }

  // Called once the user picks a file
  function handleFileLoad(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        data = JSON.parse(e.target.result);
        render();
      } catch {
        alert('Could not read the file. Make sure it is a valid Story Map JSON.');
      }
    };
    reader.readAsText(file);

    // Reset so the same file can be loaded again if needed
    event.target.value = '';
  }

  // Keep the title in sync when edited
  document.getElementById('projectTitle').addEventListener('input', function() {
    data.title = this.value;
    autoResize(this);
  });

  // ── Boot ──────────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
