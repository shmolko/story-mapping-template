<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Map</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 24px;
      color: #1a202c;
    }

    textarea {
      font-family: inherit;
      resize: none;
      overflow: hidden;
      border: none;
      outline: none;
      background: transparent;
      cursor: text;
      display: block;
      width: 100%;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    #projectTitle {
      font-size: 22px;
      font-weight: 700;
      color: #1a202c;
      flex: 1;
      min-width: 180px;
      padding: 4px 8px;
      border-radius: 6px;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    #projectTitle:focus { border-color: #4299e1; background: white; }

    .btn {
      padding: 8px 18px;
      border-radius: 7px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn-save   { background: #4299e1; color: #fff; }
    .btn-save:hover   { background: #2b6cb0; }
    .btn-load   { background: #fff; color: #4a5568; border: 1px solid #cbd5e0; }
    .btn-load:hover   { background: #edf2f7; }
    .btn-print  { background: #fff; color: #4a5568; border: 1px solid #cbd5e0; }
    .btn-print:hover  { background: #edf2f7; }

    /* ── Board ── */
    .board { display: flex; flex-direction: column; gap: 6px; }

    /* ── Column header ── */
    .board-header {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 6px;
      margin-bottom: 2px;
    }
    .col-label {
      background: #2d3748;
      color: #e2e8f0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 7px;
    }

    /* ── Goal row ── */
    .goal-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 6px;
      align-items: stretch;
    }

    /* Left cell — the goal */
    .goal-cell {
      background: #2b6cb0;
      border-radius: 8px;
      padding: 14px 14px 14px 14px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 90px;
    }
    .goal-cell textarea {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
    }
    .goal-cell textarea::placeholder { color: rgba(255,255,255,0.5); }
    .goal-cell textarea:focus {
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 3px 5px;
    }
    .goal-num {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .goal-del {
      position: absolute;
      top: 7px; right: 7px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .goal-cell:hover .goal-del { opacity: 1; }
    .goal-del:hover { background: rgba(255,255,255,0.35); }

    /* Right cell — stories */
    .stories-cell {
      background: #dbeafe;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
    }

    /* ── Story chunk card ── */
    .story-card {
      background: #fff;
      border: 2px solid #bfdbfe;
      border-radius: 8px;
      padding: 12px;
      width: 185px;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .story-card:hover {
      border-color: #60a5fa;
      box-shadow: 0 2px 8px rgba(96,165,250,0.25);
    }
    .story-card textarea.story-title {
      font-size: 12px;
      font-weight: 700;
      color: #1e40af;
      line-height: 1.4;
      padding-right: 18px;
    }
    .story-card textarea.story-title:focus {
      background: #eff6ff;
      border-radius: 4px;
      padding: 3px 5px;
    }
    .story-del {
      position: absolute;
      top: 7px; right: 7px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fee2e2;
      border: none;
      color: #dc2626;
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .story-card:hover .story-del { opacity: 1; }
    .story-del:hover { background: #fecaca; }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 8px 0 6px;
    }

    /* ── Tasks ── */
    .task-list { display: flex; flex-direction: column; gap: 3px; }

    .task-row {
      display: flex;
      align-items: flex-start;
      gap: 3px;
    }
    .task-bullet {
      color: #93c5fd;
      font-size: 10px;
      margin-top: 3px;
      flex-shrink: 0;
    }
    .task-row textarea {
      font-size: 11px;
      color: #374151;
      line-height: 1.4;
      flex: 1;
    }
    .task-row textarea:focus {
      background: #f8fafc;
      border-radius: 3px;
      padding: 2px 3px;
    }
    .task-del {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 13px;
      cursor: pointer;
      padding: 0 2px;
      opacity: 0;
      flex-shrink: 0;
      margin-top: 1px;
      line-height: 1;
      transition: color 0.1s;
    }
    .task-row:hover .task-del { opacity: 1; }
    .task-del:hover { color: #ef4444; }

    /* Add task link */
    .add-task-btn {
      background: none;
      border: none;
      font-size: 11px;
      color: #93c5fd;
      cursor: pointer;
      padding: 3px 0 0;
      text-align: left;
      transition: color 0.15s;
    }
    .add-task-btn:hover { color: #3b82f6; }

    /* Add story card */
    .add-story-card {
      width: 185px;
      border: 2px dashed #bfdbfe;
      border-radius: 8px;
      padding: 12px;
      background: transparent;
      color: #93c5fd;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      align-self: flex-start;
    }
    .add-story-card:hover {
      border-color: #3b82f6;
      color: #3b82f6;
      background: #eff6ff;
    }

    /* Add goal row */
    .add-goal-btn {
      width: 100%;
      padding: 12px;
      background: #fff;
      border: 2px dashed #cbd5e0;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 4px;
    }
    .add-goal-btn:hover { border-color: #4299e1; color: #4299e1; background: #eff6ff; }

    /* ── Print / PDF styles ── */
    @media print {
      body { background: #fff; padding: 12px; }

      /* Hide all interactive controls */
      .topbar .btn,
      .goal-del, .story-del, .task-del,
      .add-story-card, .add-task-btn, .add-goal-btn { display: none !important; }

      /* Prevent page breaks inside rows */
      .goal-row { break-inside: avoid; }

      /* Freeze colors that browsers might strip */
      .goal-cell { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .stories-cell { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .story-card { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <textarea id="projectTitle" rows="1" placeholder="Project name…">Project Story Map</textarea>
  <button class="btn btn-load"  onclick="loadFromFile()">⬆ Load JSON</button>
  <button class="btn btn-save"  onclick="saveToFile()">⬇ Save JSON</button>
  <button class="btn btn-print" onclick="window.print()">🖨 Export PDF</button>
</div>

<!-- ── Column labels ── -->
<div class="board-header">
  <div class="col-label">Goals</div>
  <div class="col-label">Story Chunks &amp; Tasks</div>
</div>

<!-- ── Board ── -->
<div class="board" id="board"></div>

<!-- Add goal -->
<button class="add-goal-btn" onclick="addGoal()">+ Add Goal</button>

<!-- Hidden file input for loading JSON -->
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileLoad(event)" />

<script>
  // ── Helpers ──────────────────────────────────────────────────────────────────

  // Generates a short random ID for each item
  function uid() {
    return Math.random().toString(36).slice(2, 9);
  }

  // Makes a textarea grow to fit its content automatically
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  // Call autoResize on all textareas after rendering
  function resizeAll() {
    document.querySelectorAll('textarea').forEach(autoResize);
  }

  // ── Data model ───────────────────────────────────────────────────────────────
  // This is the single source of truth. Everything renders from here.
  // When saved, this exact object is written to a .json file.
  let data = {
    title: "Project Story Map",
    goals: [
      {
        id: uid(),
        text: "Example Goal",
        stories: [
          {
            id: uid(),
            text: "Example story chunk",
            tasks: [
              { id: uid(), text: "Example task" }
            ]
          }
        ]
      }
    ]
  };

  // ── Render ───────────────────────────────────────────────────────────────────

  function render() {
    // Sync title field
    const titleEl = document.getElementById('projectTitle');
    titleEl.value = data.title;
    autoResize(titleEl);

    const board = document.getElementById('board');
    board.innerHTML = '';

    data.goals.forEach((goal, goalIndex) => {
      const row = document.createElement('div');
      row.className = 'goal-row';

      // Left side: the goal
      const goalCell = document.createElement('div');
      goalCell.className = 'goal-cell';
      goalCell.innerHTML = `
        <div class="goal-num">Goal ${goalIndex + 1}</div>
        <textarea
          placeholder="Describe this goal…"
          oninput="updateGoalText('${goal.id}', this.value); autoResize(this)"
        >${escHtml(goal.text)}</textarea>
        <button class="goal-del" title="Delete goal" onclick="deleteGoal('${goal.id}')">×</button>
      `;

      // Right side: story cards
      const storiesCell = document.createElement('div');
      storiesCell.className = 'stories-cell';

      goal.stories.forEach(story => {
        storiesCell.appendChild(buildStoryCard(goal.id, story));
      });

      // "Add story" placeholder card
      const addStoryBtn = document.createElement('button');
      addStoryBtn.className = 'add-story-card';
      addStoryBtn.textContent = '+ Add Story Chunk';
      addStoryBtn.onclick = () => addStory(goal.id);
      storiesCell.appendChild(addStoryBtn);

      row.appendChild(goalCell);
      row.appendChild(storiesCell);
      board.appendChild(row);
    });

    // After the DOM is updated, resize all textareas
    resizeAll();
  }

  // Build the DOM element for one story chunk card
  function buildStoryCard(goalId, story) {
    const card = document.createElement('div');
    card.className = 'story-card';
    card.id = 'story-' + story.id;

    // Story title
    const titleArea = document.createElement('textarea');
    titleArea.className = 'story-title';
    titleArea.placeholder = 'Story chunk title…';
    titleArea.value = story.text;
    titleArea.oninput = () => { updateStoryText(goalId, story.id, titleArea.value); autoResize(titleArea); };

    // Delete button for the card
    const delBtn = document.createElement('button');
    delBtn.className = 'story-del';
    delBtn.title = 'Delete story chunk';
    delBtn.textContent = '×';
    delBtn.onclick = () => deleteStory(goalId, story.id);

    // Divider between title and tasks
    const divider = document.createElement('div');
    divider.className = 'divider';

    // Task list
    const taskList = document.createElement('div');
    taskList.className = 'task-list';
    story.tasks.forEach(task => {
      taskList.appendChild(buildTaskRow(goalId, story.id, task));
    });

    // "Add task" button
    const addTaskBtn = document.createElement('button');
    addTaskBtn.className = 'add-task-btn';
    addTaskBtn.textContent = '+ Add task';
    addTaskBtn.onclick = () => addTask(goalId, story.id);

    card.appendChild(delBtn);
    card.appendChild(titleArea);
    card.appendChild(divider);
    card.appendChild(taskList);
    card.appendChild(addTaskBtn);

    return card;
  }

  // Build the DOM element for one task row
  function buildTaskRow(goalId, storyId, task) {
    const row = document.createElement('div');
    row.className = 'task-row';
    row.id = 'task-' + task.id;

    const bullet = document.createElement('span');
    bullet.className = 'task-bullet';
    bullet.textContent = '●';

    const textarea = document.createElement('textarea');
    textarea.value = task.text;
    textarea.placeholder = 'Task description…';
    textarea.oninput = () => { updateTaskText(goalId, storyId, task.id, textarea.value); autoResize(textarea); };

    const delBtn = document.createElement('button');
    delBtn.className = 'task-del';
    delBtn.title = 'Delete task';
    delBtn.textContent = '×';
    delBtn.onclick = () => deleteTask(goalId, storyId, task.id);

    row.appendChild(bullet);
    row.appendChild(textarea);
    row.appendChild(delBtn);

    return row;
  }

  // Escape special HTML characters to prevent broken rendering
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Data mutations ────────────────────────────────────────────────────────────
  // Each of these updates the data model and triggers a re-render

  function updateGoalText(goalId, text) {
    const g = data.goals.find(g => g.id === goalId);
    if (g) g.text = text;
  }

  function updateStoryText(goalId, storyId, text) {
    const g = data.goals.find(g => g.id === goalId);
    const s = g?.stories.find(s => s.id === storyId);
    if (s) s.text = text;
  }

  function updateTaskText(goalId, storyId, taskId, text) {
    const g = data.goals.find(g => g.id === goalId);
    const s = g?.stories.find(s => s.id === storyId);
    const t = s?.tasks.find(t => t.id === taskId);
    if (t) t.text = text;
  }

  function addGoal() {
    data.goals.push({ id: uid(), text: 'New Goal', stories: [] });
    render();
  }

  function deleteGoal(goalId) {
    if (!confirm('Delete this goal and all its story chunks?')) return;
    data.goals = data.goals.filter(g => g.id !== goalId);
    render();
  }

  function addStory(goalId) {
    const g = data.goals.find(g => g.id === goalId);
    if (g) { g.stories.push({ id: uid(), text: 'New story chunk', tasks: [] }); render(); }
  }

  function deleteStory(goalId, storyId) {
    const g = data.goals.find(g => g.id === goalId);
    if (g) { g.stories = g.stories.filter(s => s.id !== storyId); render(); }
  }

  function addTask(goalId, storyId) {
    const g = data.goals.find(g => g.id === goalId);
    const s = g?.stories.find(s => s.id === storyId);
    if (s) { s.tasks.push({ id: uid(), text: 'New task' }); render(); }
  }

  function deleteTask(goalId, storyId, taskId) {
    const g = data.goals.find(g => g.id === goalId);
    const s = g?.stories.find(s => s.id === storyId);
    if (s) { s.tasks = s.tasks.filter(t => t.id !== taskId); render(); }
  }

  // ── Save & Load ───────────────────────────────────────────────────────────────

  // Saves the current board as a .json file that downloads to your computer
  function saveToFile() {
    data.title = document.getElementById('projectTitle').value;
    const json = JSON.stringify(data, null, 2); // "null, 2" makes it nicely indented
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = (data.title || 'story-map') + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  // Opens the file picker so you can load a previously saved .json
  function loadFromFile() {
    document.getElementById('fileInput').click();
  }

  // Called once the user picks a file
  function handleFileLoad(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        data = JSON.parse(e.target.result);
        render();
      } catch {
        alert('Could not read the file. Make sure it is a valid Story Map JSON.');
      }
    };
    reader.readAsText(file);

    // Reset so the same file can be loaded again if needed
    event.target.value = '';
  }

  // Keep the title in sync when edited
  document.getElementById('projectTitle').addEventListener('input', function() {
    data.title = this.value;
    autoResize(this);
  });

  // ── Boot ──────────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
